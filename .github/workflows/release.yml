name: Release

env:
  WAILS_VERSION: v2.11.0

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for artifact naming (e.g. 0.2.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
          - os: ubuntu-22.04
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf || \
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Download Go modules
        run: go mod download

      - name: Resolve version label
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "VERSION_LABEL=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION_LABEL=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Build desktop app
        run: go run github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }} build -clean -ldflags "-X main.version=${{ env.VERSION_LABEL }}"

      - name: Package build artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          $archive = "dist-artifacts/acp-desktop-${{ matrix.artifact }}-${{ env.VERSION_LABEL }}.zip"
          Compress-Archive -Path "build/bin/*" -DestinationPath $archive -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-desktop-${{ matrix.artifact }}-${{ env.VERSION_LABEL }}
          path: dist-artifacts/*
          if-no-files-found: error

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ACP DESKTOP ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          files: dist-artifacts/*
