name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for artifact naming (e.g. 0.2.0)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
          - os: ubuntu-22.04
            artifact: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build desktop app
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.10.1 build -clean

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: acp-ui-${{ matrix.artifact }}-${{ github.ref_name }}
          path: build/bin/**
          if-no-files-found: error
